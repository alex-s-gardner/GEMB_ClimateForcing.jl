name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'  # LTS
          - '1'     # Latest stable
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - name: Run basic tests (without CDS API key)
        uses: julia-actions/julia-runtest@v1
        env:
          # Basic tests run without credentials
          CDS_API_KEY: ""

      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'

      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.version == '1'
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests (with credentials)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - name: Run integration tests with CDS API key
        uses: julia-actions/julia-runtest@v1
        env:
          CDS_API_KEY: ${{ secrets.CDS_API_KEY }}
        continue-on-error: true  # Don't fail if secrets aren't available
